# BobFrames CI — runs the full gate suite on every push/PR; publishes on a v* tag.
#
# Windows-only (v1): qrenderdoc replay is Windows-only, so the matrix is windows-latest only.
# KNOWN GAP (DECISIONS ADR-6): the hosted runner has no GPU/RenderDoc, so the INGEST path is never
# exercised here. The c03 mocked-subprocess unit test (test_hardening.py) is the stand-in; full
# `smoke --data <real>` ingest is self-hosted/nightly (v0.2). The `smoke` step below is render-only
# against the bundled synthetic fixture.
name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: pwsh

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        # QUALITY_GATES §21.6. 3.14 omitted — no pyarrow 17 cp314 wheel (ADR-6).
        python: ["3.10", "3.12", "3.13"]
        pyarrow: ["17", "21"]            # lower + upper of the `pyarrow>=17,<22` pin
        exclude:
          # pyarrow 17 has no cp313 wheel (3.13 support landed in pyarrow 18); 3.13's effective
          # lower bound is 18. Drop this cell so install doesn't fail. (Deviates from §21.6's
          # literal grid — see c17 session log.)
          - python: "3.13"
            pyarrow: "17"
    name: test py${{ matrix.python }} pyarrow${{ matrix.pyarrow }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install package + dev deps, pin pyarrow
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install --upgrade "pyarrow==${{ matrix.pyarrow }}.*"

      - name: Resolved versions
        run: |
          bobframes version
          node --version          # the panel JS gate needs node; fail loudly here if it is ever absent

      # Every gate runs on every cell EXCEPT golden byte-parity (test_parity), which is pinned to
      # the canonical env below. The rendered HTML embeds environment-variable bytes that are not a
      # cross-build promise: parquet file sizes differ by pyarrow writer version, and a computed
      # percentage can flip one ULP across numpy builds (py3.10) at a .2f rounding boundary. So the
      # snapshot is only byte-identical on the env it was baked in. test_determinism stays here: it
      # renders twice in the SAME env, so it is stable on every cell. See DECISIONS ADR-11.
      # (Filenames are test_*.py — no pytest `python_files` override — so §21.6's `tests/unit_*.py`
      # maps to test_stable_keys / test_schemas_unit / test_discovery, `tests/parity.py` ->
      # test_parity.py, etc.)
      # `browser`-marked tests are EXCLUDED here: they drive a headless Chrome over CDP and are
      # documented (pyproject marker) as opt-in -- "never runs in the default suite." They flake under
      # CI's parallel load (a screenshot pixel-diff is timing-sensitive) and must not gate the release.
      # The browser product-smokes still run locally and as the mandatory pre-tag `pytest -m browser`
      # sign-off, so coverage is not lost -- just moved off the flaky CI gate (ADR-23: align with the
      # marker's documented intent, not narrow a real gate).
      - name: pytest (all gates except golden-env byte comparisons + opt-in browser)
        run: python -m pytest bobframes/tests -m "not golden_env and not browser" -v

      # The panel client JS is the only un-typechecked surface and pytest exercises the HTTP surface
      # without ever parsing the JS -- v028_2 shipped a broken <script> through five commits because of
      # exactly that gap (ADR-47 panel). `node --check` the externalized client (syntax-only; browser
      # globals are fine) so a parse error fails the build. UNCONDITIONAL on purpose -- node is
      # preinstalled on windows-latest, so this can never silently skip (ADR-23).
      - name: panel JS parses (node --check)
        run: node --check bobframes/ui/assets/panel.js

      - name: golden byte-parity (canonical env only)
        # The `golden_env` byte-for-byte HTML comparisons (test_parity + the test_package inline/
        # shared/light/redacted tree-vs-golden checks) embed environment-dependent computed bytes
        # (float formatting across Python versions; parquet sizes across pyarrow writers), so the
        # snapshot is byte-identical only on this canonical cell (ADR-11, D-8).
        if: matrix.python == '3.12' && matrix.pyarrow == '21'
        run: python -m pytest bobframes/tests -m "golden_env" -v

      - name: smoke (render-only against bundled synthetic)
        run: bobframes smoke

      - name: lint golden HTML
        run: |
          $files = Get-ChildItem -Recurse bobframes/tests/data/golden -Filter *.html | ForEach-Object FullName
          bobframes lint @files

  publish:
    # Builds + publishes ONLY on a v* tag. No tag is pushed until c19 — until then this job is inert.
    # Requires the test matrix to pass first. Auth is PyPI Trusted Publishing (OIDC) — no API token /
    # secret; a pending publisher must be configured on PyPI (owner=altpsyche, repo=bobframes,
    # workflow=ci.yml). Runs on ubuntu: the wheel is py3-none-any (pure Python) and the OIDC publish
    # action is Linux-only. See DECISIONS ADR-13.
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write          # create the GitHub Release
      id-token: write          # PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: GitHub Release (wheel + sdist + notes)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
